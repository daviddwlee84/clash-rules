# Example: consume the SAME rule-sets from Shadowrocket.
# Settings > Config > Edit, [Rule] section. The .list bodies are identical to
# the Clash ones (classical syntax minus policy), so one source feeds both.
#
# Policy names: map to your Shadowrocket proxy groups (PROXY/DIRECT/REJECT
# are built-in; create "Apple"/"GlobalMedia"/"HKMTMedia" groups or just point
# those RULE-SET lines at PROXY/DIRECT to taste).

[Rule]
RULE-SET,https://cdn.jsdelivr.net/gh/daviddwlee84/clash-rules@release/shadowrocket/reject.list,REJECT
RULE-SET,https://cdn.jsdelivr.net/gh/daviddwlee84/clash-rules@release/shadowrocket/apple.list,DIRECT
RULE-SET,https://cdn.jsdelivr.net/gh/daviddwlee84/clash-rules@release/shadowrocket/media-hkmt.list,DIRECT
RULE-SET,https://cdn.jsdelivr.net/gh/daviddwlee84/clash-rules@release/shadowrocket/media-global.list,PROXY
RULE-SET,https://cdn.jsdelivr.net/gh/daviddwlee84/clash-rules@release/shadowrocket/direct.list,DIRECT
RULE-SET,https://cdn.jsdelivr.net/gh/daviddwlee84/clash-rules@release/shadowrocket/proxy.list,PROXY
GEOIP,CN,DIRECT
FINAL,PROXY
